<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEON STORM: Space Shooter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    body {
      background-color: #050505;
      color: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 800px;
      max-height: 950px;
      aspect-ratio: 800 / 950;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: none;
      border-radius: 0;
      overflow: hidden;
      border: 4px solid #1a1a1a;
      background-color: #000000;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }
    /* Simple fallbacks and mobile visual aids */
    .touch-instructions {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
      text-align: center;
      width: 90%;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="950"></canvas>
    <div class="touch-instructions" id="instructions">
      Use Left/Right Arrows or Drag on Screen to Move • Spacebar/Tap to Fire
    </div>
  </div>
  
  <script>
    // --- Web Audio API Synthesizer ---
    class SoundController {
      constructor() {
        this.ctx = null;
        this.muted = localStorage.getItem('neon_storm_muted') === 'true';
      }

      init() {
        if (this.ctx) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.warn("Web Audio API not supported in this browser", e);
        }
      }

      toggleMute() {
        this.muted = !this.muted;
        localStorage.setItem('neon_storm_muted', this.muted);
        return this.muted;
      }

      playLaser() {
        if (this.muted) return;
        this.init();
        if (!this.ctx) return;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.12);
        
        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.12);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.12);
      }

      playEnemyLaser() {
        if (this.muted) return;
        this.init();
        if (!this.ctx) return;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.18);
        
        gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.18);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.18);
      }

      playExplosion(type = 'normal') {
        if (this.muted) return;
        this.init();
        if (!this.ctx) return;

        const duration = type === 'player' ? 0.8 : (type === 'cruiser' ? 0.4 : 0.2);
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(type === 'player' ? 200 : (type === 'cruiser' ? 400 : 700), this.ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + duration);

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(type === 'player' ? 0.35 : (type === 'cruiser' ? 0.25 : 0.18), this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        noise.start();
        noise.stop(this.ctx.currentTime + duration);
      }

      playPowerup() {
        if (this.muted) return;
        this.init();
        if (!this.ctx) return;

        const now = this.ctx.currentTime;
        const scale = [261.63, 329.63, 392.00, 523.25, 659.25]; // C4, E4, G4, C5, E5
        
        scale.forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + i * 0.05);
          
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.12, now + i * 0.05 + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.12);
          
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          
          osc.start(now + i * 0.05);
          osc.stop(now + i * 0.05 + 0.12);
        });
      }

      playHit() {
        if (this.muted) return;
        this.init();
        if (!this.ctx) return;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(160, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.15);
        
        gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.15);
      }

      playProceduralBeat(freq, duration) {
        if (this.muted) return;
        this.init();
        if (!this.ctx) return;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        
        gain.gain.setValueAtTime(0.035, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      }
    }

    const sound = new SoundController();

    // --- Starfield Class ---
    class Star {
      constructor(canvasWidth, canvasHeight, isInitial = false) {
        this.canvasWidth = canvasWidth;
        this.canvasHeight = canvasHeight;
        this.x = Math.random() * canvasWidth;
        this.y = isInitial ? Math.random() * canvasHeight : -10;
        this.size = Math.random() * 2 + 0.5;
        this.speed = Math.random() * 1.5 + 0.5;
        // Parallax depth color
        const brightness = Math.floor(this.speed * 100);
        this.color = `rgba(${brightness + 50}, ${brightness + 100}, ${brightness + 155}, ${Math.random() * 0.5 + 0.3})`;
      }

      update() {
        this.y += this.speed;
        if (this.y > this.canvasHeight) {
          this.y = -10;
          this.x = Math.random() * this.canvasWidth;
        }
      }

      draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // --- Particle Class ---
    class Particle {
      constructor(x, y, color, size, speedX, speedY, decay) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = size;
        this.speedX = speedX;
        this.speedY = speedY;
        this.decay = decay || Math.random() * 0.02 + 0.015;
        this.alpha = 1;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedX *= 0.98; // Friction
        this.speedY *= 0.98;
        this.alpha -= this.decay;
      }

      draw(ctx) {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = this.size * 2;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // --- Player Class ---
    class Player {
      constructor(canvasWidth, canvasHeight) {
        this.canvasWidth = canvasWidth;
        this.canvasHeight = canvasHeight;
        this.width = 44;
        this.height = 44;
        this.x = canvasWidth / 2;
        this.y = canvasHeight - 100;
        this.vx = 0;
        this.speed = 0.85;
        this.friction = 0.88;
        this.maxSpeed = 10;
        this.hp = 3;
        this.maxHp = 3;
        this.shield = false;
        
        // Weapon multipliers
        this.doubleShotTimer = 0;
        this.spreadShotTimer = 0;
        this.shootCooldown = 0;
        this.shootInterval = 140; // milliseconds
      }

      moveLeft() {
        this.vx -= this.speed;
      }

      moveRight() {
        this.vx += this.speed;
      }

      moveTo(targetX) {
        // Linear interpolation to mouse/touch coordinates
        const dx = targetX - this.x;
        this.x += dx * 0.16;
      }

      update(dt, keyboardLeft, keyboardRight) {
        // Keyboard movement physics
        if (keyboardLeft) this.moveLeft();
        if (keyboardRight) this.moveRight();

        this.vx *= this.friction;
        if (this.vx > this.maxSpeed) this.vx = this.maxSpeed;
        if (this.vx < -this.maxSpeed) this.vx = -this.maxSpeed;

        this.x += this.vx;

        // Boundaries checks
        if (this.x < this.width) {
          this.x = this.width;
          this.vx = 0;
        }
        if (this.x > this.canvasWidth - this.width) {
          this.x = this.canvasWidth - this.width;
          this.vx = 0;
        }

        // Countdown powerups
        if (this.doubleShotTimer > 0) this.doubleShotTimer -= dt;
        if (this.spreadShotTimer > 0) this.spreadShotTimer -= dt;
        if (this.shootCooldown > 0) this.shootCooldown -= dt * 1000;
      }

      draw(ctx, timestamp) {
        ctx.save();
        
        // Glow effect
        ctx.shadowBlur = 18;
        ctx.shadowColor = this.shield ? '#00e5ff' : '#00ffd0';
        
        // Thrust jet fire effect
        const thrustHeight = 12 + Math.sin(timestamp * 0.05) * 6;
        ctx.fillStyle = '#ff3c00';
        ctx.beginPath();
        ctx.moveTo(this.x - 6, this.y + 15);
        ctx.lineTo(this.x, this.y + 15 + thrustHeight);
        ctx.lineTo(this.x + 6, this.y + 15);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.moveTo(this.x - 3, this.y + 15);
        ctx.lineTo(this.x, this.y + 15 + thrustHeight * 0.6);
        ctx.lineTo(this.x + 3, this.y + 15);
        ctx.closePath();
        ctx.fill();

        // Draw Spaceship Body (Arcade style neon vector line)
        ctx.strokeStyle = this.shield ? '#00e5ff' : '#00ffd0';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        
        // Sleek nose
        ctx.moveTo(this.x, this.y - 20);
        // Left Wing outer tip
        ctx.lineTo(this.x - 22, this.y + 12);
        // Left wing inner indentation
        ctx.lineTo(this.x - 10, this.y + 6);
        // Engine body base
        ctx.lineTo(this.x - 8, this.y + 15);
        ctx.lineTo(this.x + 8, this.y + 15);
        // Right wing inner indentation
        ctx.lineTo(this.x + 10, this.y + 6);
        // Right Wing outer tip
        ctx.lineTo(this.x + 22, this.y + 12);
        ctx.closePath();
        ctx.stroke();

        // Inner glowing core
        ctx.fillStyle = 'rgba(0, 255, 208, 0.25)';
        ctx.fill();

        // Left wing cannon
        ctx.strokeStyle = '#00ffd0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x - 15, this.y + 4);
        ctx.lineTo(this.x - 15, this.y - 6);
        ctx.moveTo(this.x + 15, this.y + 4);
        ctx.lineTo(this.x + 15, this.y - 6);
        ctx.stroke();

        // Draw Shield dome
        if (this.shield) {
          ctx.strokeStyle = 'rgba(0, 229, 255, 0.85)';
          ctx.shadowColor = '#00e5ff';
          ctx.shadowBlur = 24;
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]); // Animated dashed shield ring
          ctx.beginPath();
          ctx.arc(this.x, this.y, 35, 0 + timestamp * 0.002, Math.PI * 2 + timestamp * 0.002);
          ctx.stroke();
          
          ctx.fillStyle = 'rgba(0, 229, 255, 0.06)';
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.arc(this.x, this.y, 35, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }
    }

    // --- Projectile Class ---
    class Projectile {
      constructor(x, y, vx, vy, isEnemy = false, color = '#00ffd0') {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.isEnemy = isEnemy;
        this.color = color;
        this.size = isEnemy ? 6 : 4;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
      }

      draw(ctx) {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        
        ctx.beginPath();
        if (this.isEnemy) {
          // Draw energy orbs for enemies
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        } else {
          // Draw lasers for player
          ctx.rect(this.x - 2, this.y - 12, 4, 15);
        }
        ctx.fill();
        ctx.restore();
      }
    }

    // --- Enemy Class ---
    class Enemy {
      constructor(canvasWidth, type, speedMultiplier) {
        this.canvasWidth = canvasWidth;
        this.type = type; // 'scout', 'swarmer', 'cruiser'
        this.hp = 1;
        this.maxHp = 1;
        this.width = 36;
        this.height = 36;
        this.color = '#ff1d53';
        this.vy = 2;
        this.vx = 0;
        this.sineTimer = Math.random() * Math.PI * 2;
        this.shootTimer = Math.random() * 1500 + 1000; // time before cruiser shoots
        
        // Spawn coordinates
        this.x = Math.random() * (canvasWidth - 100) + 50;
        this.y = -50;

        // Configuration based on type
        if (type === 'scout') {
          this.hp = 1;
          this.maxHp = 1;
          this.width = 36;
          this.height = 34;
          this.vy = (Math.random() * 1.5 + 2.0) * speedMultiplier;
          this.color = '#39ff14'; // Neon Green
          this.scoreValue = 50;
        } else if (type === 'swarmer') {
          this.hp = 1;
          this.maxHp = 1;
          this.width = 24;
          this.height = 24;
          this.vy = (Math.random() * 1.5 + 4.2) * speedMultiplier;
          this.color = '#ffff00'; // Neon Yellow
          this.scoreValue = 100;
        } else if (type === 'cruiser') {
          this.hp = 3;
          this.maxHp = 3;
          this.width = 60;
          this.height = 50;
          this.vy = (Math.random() * 0.4 + 1.1) * speedMultiplier;
          this.color = '#ff003c'; // Neon Crimson
          this.scoreValue = 250;
        }
      }

      update(dt, playerX) {
        this.y += this.vy;

        if (this.type === 'cruiser') {
          // Cruiser sways back and forth
          this.sineTimer += dt * 3;
          this.vx = Math.sin(this.sineTimer) * 1.8;
          this.x += this.vx;
          
          // Cruiser shoots at player occasionally
          this.shootTimer -= dt * 1000;
        } else if (this.type === 'swarmer') {
          // Swarmers home slightly towards player horizontal position
          const dx = playerX - this.x;
          this.vx = Math.sign(dx) * 1.2;
          this.x += this.vx;
        }

        // Bound to screen edges
        if (this.x < this.width / 2) this.x = this.width / 2;
        if (this.x > this.canvasWidth - this.width / 2) this.x = this.canvasWidth - this.width / 2;
      }

      draw(ctx, timestamp) {
        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2.5;

        // Health bar overlay for Cruisers (if damaged)
        if (this.hp < this.maxHp) {
          const barWidth = this.width * 0.8;
          const barHeight = 4;
          ctx.fillStyle = '#444444';
          ctx.fillRect(this.x - barWidth / 2, this.y - this.height / 2 - 12, barWidth, barHeight);
          ctx.fillStyle = this.color;
          ctx.fillRect(this.x - barWidth / 2, this.y - this.height / 2 - 12, barWidth * (this.hp / this.maxHp), barHeight);
        }

        ctx.translate(this.x, this.y);

        if (this.type === 'scout') {
          // Inverted sleek vector triangle
          ctx.beginPath();
          ctx.moveTo(0, this.height / 2);
          ctx.lineTo(-this.width / 2, -this.height / 2);
          ctx.lineTo(0, -this.height * 0.15);
          ctx.lineTo(this.width / 2, -this.height / 2);
          ctx.closePath();
          ctx.stroke();
          ctx.fillStyle = 'rgba(57, 255, 20, 0.1)';
          ctx.fill();
        } else if (this.type === 'swarmer') {
          // Rotating diamond swarmer
          ctx.rotate(timestamp * 0.004);
          ctx.beginPath();
          ctx.moveTo(0, -this.height / 2);
          ctx.lineTo(this.width / 2, 0);
          ctx.lineTo(0, this.height / 2);
          ctx.lineTo(-this.width / 2, 0);
          ctx.closePath();
          ctx.stroke();
          ctx.fillStyle = 'rgba(255, 255, 0, 0.15)';
          ctx.fill();
        } else if (this.type === 'cruiser') {
          // Heavy cruiser mechanical shape
          ctx.beginPath();
          ctx.moveTo(0, this.height / 2);
          ctx.lineTo(-this.width * 0.4, this.height * 0.1);
          ctx.lineTo(-this.width / 2, -this.height / 2);
          ctx.lineTo(-this.width * 0.15, -this.height * 0.35);
          ctx.lineTo(this.width * 0.15, -this.height * 0.35);
          ctx.lineTo(this.width / 2, -this.height / 2);
          ctx.lineTo(this.width * 0.4, this.height * 0.1);
          ctx.closePath();
          ctx.stroke();
          
          ctx.fillStyle = 'rgba(255, 0, 60, 0.1)';
          ctx.fill();

          // Engine exhausts
          const engineGlow = 4 + Math.sin(timestamp * 0.08) * 3;
          ctx.fillStyle = '#ff5100';
          ctx.fillRect(-15, -this.height / 2 - engineGlow, 8, engineGlow);
          ctx.fillRect(7, -this.height / 2 - engineGlow, 8, engineGlow);
        }

        ctx.restore();
      }
    }

    // --- Power-up Class ---
    class Powerup {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'shield', 'double', 'spread', 'bomb'
        this.vy = 2.0;
        this.size = 28;
        this.pulse = 0;
        
        if (type === 'shield') {
          this.color = '#00f0ff'; // Cyan
          this.label = 'S';
        } else if (type === 'double') {
          this.color = '#ffeb3b'; // Yellow
          this.label = 'D';
        } else if (type === 'spread') {
          this.color = '#e040fb'; // Purple
          this.label = 'T'; // Triple
        } else if (type === 'bomb') {
          this.color = '#ff9800'; // Orange
          this.label = 'B';
        }
      }

      update(dt) {
        this.y += this.vy;
        this.pulse += dt * 6;
      }

      draw(ctx) {
        ctx.save();
        ctx.shadowBlur = 15 + Math.sin(this.pulse) * 6;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;

        // Circular ring
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fill();

        // Inner core
        ctx.fillStyle = this.color;
        ctx.font = '900 13px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.label, this.x, this.y);

        ctx.restore();
      }
    }

    // --- Screen Shockwave Effect ---
    class Shockwave {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 10;
        this.maxRadius = 750;
        this.speed = 12.0;
        this.alpha = 1.0;
      }

      update() {
        this.radius += this.speed;
        this.alpha = 1.0 - (this.radius / this.maxRadius);
      }

      draw(ctx) {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 6;
        ctx.shadowBlur = 35;
        ctx.shadowColor = '#00ffd0';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    // --- Game Engine Controller ---
    class Game {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        // Settings & Dimensions
        this.width = this.canvas.width;
        this.height = this.canvas.height;
        
        // Game States: 'START', 'PLAYING', 'PAUSED', 'GAMEOVER'
        this.state = 'START';
        
        // Core entities
        this.player = null;
        this.stars = [];
        this.projectiles = [];
        this.enemies = [];
        this.particles = [];
        this.powerups = [];
        this.shockwave = null;
        
        // Control indicators
        this.keys = {};
        this.touchX = null;
        this.isPointerDown = false;
        
        // Score & stats
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('neon_storm_high')) || 0;
        this.stage = 1;
        this.enemySpawnTimer = 0;
        
        // Combo multipliers
        this.comboCount = 0;
        this.comboMultiplier = 1;
        this.comboDecay = 0; // standard 2.0s countdown
        
        // FX systems
        this.screenShakeTime = 0;
        this.screenShakeIntensity = 0;
        
        // Audio scheduling beat
        this.beatTimer = 0;
        this.beatStep = 0;
        this.beatIntervals = [0.4, 0.4]; // changes rhythm
        
        // Time mechanics
        this.lastTime = 0;

        // UI Setup
        this.instructionsElement = document.getElementById('instructions');

        this.initEventListeners();
        this.initStars();
      }

      initStars() {
        this.stars = [];
        for (let i = 0; i < 90; i++) {
          this.stars.push(new Star(this.width, this.height, true));
        }
      }

      initEventListeners() {
        // Keyboard inputs
        window.addEventListener('keydown', (e) => {
          this.keys[e.key] = true;
          this.keys[e.code] = true; // Support alternative code variants

          // Toggle pause
          if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
            if (this.state === 'PLAYING') {
              this.state = 'PAUSED';
            } else if (this.state === 'PAUSED') {
              this.state = 'PLAYING';
            }
          }

          // Restart
          if ((e.key === 'r' || e.key === 'R') && this.state === 'GAMEOVER') {
            this.resetGame();
          }

          // Start game
          if (e.key === ' ' && this.state === 'START') {
            sound.init();
            this.resetGame();
          }
        });

        window.addEventListener('keyup', (e) => {
          this.keys[e.key] = false;
          this.keys[e.code] = false;
        });

        // Mouse/Touch controls (supports easy dragging play)
        const getCanvasCoords = (e) => {
          const rect = this.canvas.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          
          // Map to 800x950 internal grid
          const scaleX = this.width / rect.width;
          const scaleY = this.height / rect.height;
          return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
          };
        };

        const handlePointerDown = (e) => {
          sound.init();
          if (this.state === 'START') {
            const coords = getCanvasCoords(e);
            // Check if mute clicked
            if (coords.x > this.width - 60 && coords.y < 60) {
              sound.toggleMute();
              sound.playPowerup();
              return;
            }
            this.resetGame();
            return;
          }

          if (this.state === 'GAMEOVER') {
            const coords = getCanvasCoords(e);
            // Restart button click region (center)
            if (coords.y > 550 && coords.y < 700) {
              this.resetGame();
            }
            return;
          }

          if (this.state === 'PAUSED') {
            this.state = 'PLAYING';
            return;
          }

          if (this.state === 'PLAYING') {
            const coords = getCanvasCoords(e);
            
            // Check if mute button clicked
            if (coords.x > this.width - 60 && coords.y < 60) {
              sound.toggleMute();
              sound.playLaser();
              return;
            }

            this.isPointerDown = true;
            this.touchX = coords.x;
          }
        };

        const handlePointerMove = (e) => {
          if (this.state === 'PLAYING' && this.isPointerDown) {
            const coords = getCanvasCoords(e);
            this.touchX = coords.x;
          }
        };

        const handlePointerUp = () => {
          this.isPointerDown = false;
          this.touchX = null;
        };

        this.canvas.addEventListener('mousedown', handlePointerDown);
        this.canvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          handlePointerDown(e);
        }, { passive: false });

        this.canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          handlePointerMove(e);
        }, { passive: false });

        window.addEventListener('touchend', handlePointerUp);
      }

      resetGame() {
        this.player = new Player(this.width, this.height);
        this.enemies = [];
        this.projectiles = [];
        this.particles = [];
        this.powerups = [];
        this.shockwave = null;
        
        this.score = 0;
        this.stage = 1;
        this.enemySpawnTimer = 0;
        
        this.comboCount = 0;
        this.comboMultiplier = 1;
        this.comboDecay = 0;
        
        this.state = 'PLAYING';
        this.instructionsElement.style.opacity = '1';
        
        // Warm up stars
        this.initStars();
        sound.playPowerup();
      }

      spawnExplosion(x, y, color, count = 15, sizeMax = 4.5) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 5 + 1.5;
          const size = Math.random() * sizeMax + 1.2;
          this.particles.push(new Particle(
            x, y,
            color,
            size,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed
          ));
        }
      }

      triggerShake(intensity, duration) {
        this.screenShakeIntensity = intensity;
        this.screenShakeTime = duration;
      }

      triggerBomb(cx, cy) {
        this.shockwave = new Shockwave(cx, cy);
        this.triggerShake(16, 0.55);
        sound.playExplosion('player');

        // Destroy all enemies on screen with delay animations
        this.enemies.forEach((enemy) => {
          const calculatedScore = enemy.scoreValue * this.comboMultiplier;
          this.score += calculatedScore;

          // Explode enemy
          this.spawnExplosion(enemy.x, enemy.y, enemy.color, 25, 6);
          sound.playExplosion(enemy.type === 'cruiser' ? 'cruiser' : 'normal');

          // Maybe spawn powerup (with reduced chance for bomb clear)
          if (Math.random() < 0.05) {
            this.spawnPowerup(enemy.x, enemy.y);
          }
        });
        this.enemies = [];
        
        // Boost combo
        this.comboCount += 5;
        this.comboMultiplier = Math.min(5, Math.floor(this.comboCount / 5) + 1);
        this.comboDecay = 2.0;
      }

      spawnPowerup(x, y) {
        const types = ['shield', 'double', 'spread', 'bomb'];
        // Equal distribution, but slightly lower chance for bombs
        const weights = [0.3, 0.3, 0.3, 0.1];
        let rand = Math.random();
        let chosenType = types[0];
        
        for (let i = 0; i < weights.length; i++) {
          rand -= weights[i];
          if (rand <= 0) {
            chosenType = types[i];
            break;
          }
        }
        this.powerups.push(new Powerup(x, y, chosenType));
      }

      firePlayerLaser() {
        if (!this.player || this.player.shootCooldown > 0) return;

        sound.playLaser();
        
        const bulletSpeed = -14;

        if (this.player.spreadShotTimer > 0) {
          // 3-way spread shot
          this.projectiles.push(new Projectile(this.player.x, this.player.y - 12, 0, bulletSpeed, false, '#e040fb'));
          this.projectiles.push(new Projectile(this.player.x - 10, this.player.y - 6, -3, bulletSpeed + 1, false, '#e040fb'));
          this.projectiles.push(new Projectile(this.player.x + 10, this.player.y - 6, 3, bulletSpeed + 1, false, '#e040fb'));
        } else if (this.player.doubleShotTimer > 0) {
          // Double parallel laser shot
          this.projectiles.push(new Projectile(this.player.x - 14, this.player.y - 5, 0, bulletSpeed, false, '#ffeb3b'));
          this.projectiles.push(new Projectile(this.player.x + 14, this.player.y - 5, 0, bulletSpeed, false, '#ffeb3b'));
        } else {
          // Standard single laser shot
          this.projectiles.push(new Projectile(this.player.x, this.player.y - 12, 0, bulletSpeed, false, '#00ffd0'));
        }

        this.player.shootCooldown = this.player.shootInterval;
      }

      update(dt, timestamp) {
        // Starfield updates (always run)
        this.stars.forEach(star => star.update());

        if (this.state === 'START') {
          return;
        }

        if (this.state === 'PLAYING') {
          // Dynamic soundtrack pulse
          this.beatTimer += dt;
          const tempo = Math.max(0.18, 0.36 - (this.stage * 0.02));
          if (this.beatTimer >= tempo) {
            this.beatTimer = 0;
            // procedurally trigger low/mid alternating space bass melody
            const freqs = [82, 82, 98, 98, 110, 110, 73, 73]; // E2, G2, A2, D2
            const note = freqs[this.beatStep % freqs.length];
            const oct = this.beatStep % 2 === 0 ? 1 : 1.5;
            sound.playProceduralBeat(note * oct, tempo * 0.8);
            this.beatStep++;
          }

          // Screen shake math decay
          if (this.screenShakeTime > 0) {
            this.screenShakeTime -= dt;
          } else {
            this.screenShakeIntensity = 0;
          }

          // Update combo decay
          if (this.comboDecay > 0) {
            this.comboDecay -= dt;
            if (this.comboDecay <= 0) {
              this.comboCount = 0;
              this.comboMultiplier = 1;
            }
          }

          // Spawn enemies
          this.enemySpawnTimer -= dt * 1000;
          if (this.enemySpawnTimer <= 0) {
            const baseInterval = Math.max(380, 1500 - (this.stage * 120));
            this.enemySpawnTimer = baseInterval + Math.random() * 400;

            // Decide Enemy Type distribution
            let type = 'scout';
            const roll = Math.random();
            if (this.stage === 1) {
              type = 'scout';
            } else if (this.stage === 2) {
              type = roll < 0.78 ? 'scout' : 'swarmer';
            } else {
              if (roll < 0.55) {
                type = 'scout';
              } else if (roll < 0.82) {
                type = 'swarmer';
              } else {
                type = 'cruiser';
              }
            }

            const speedMultiplier = 1.0 + (this.stage - 1) * 0.08;
            this.enemies.push(new Enemy(this.width, type, speedMultiplier));
          }

          // Update Player
          const leftPressed = this.keys['ArrowLeft'] || this.keys['KeyA'];
          const rightPressed = this.keys['ArrowRight'] || this.keys['KeyD'];
          
          if (this.touchX !== null) {
            this.player.moveTo(this.touchX);
          }
          this.player.update(dt, leftPressed, rightPressed);

          // Handle automatic shooting if mouse dragging or Spacebar pressed
          const firePressed = this.keys[' '] || this.keys['ArrowUp'] || this.keys['KeyW'];
          if (firePressed || this.isPointerDown) {
            this.firePlayerLaser();
            if (this.instructionsElement.style.opacity > 0) {
              this.instructionsElement.style.opacity = '0'; // Hide starting guides
            }
          }

          // Update Projectiles
          this.projectiles.forEach((proj, idx) => {
            proj.update();
            // Out of bounds cleanup
            if (proj.y < -30 || proj.y > this.height + 30) {
              this.projectiles.splice(idx, 1);
            }
          });

          // Update Enemies
          this.enemies.forEach((enemy, idx) => {
            enemy.update(dt, this.player.x);

            // Cruiser firing logic
            if (enemy.type === 'cruiser' && enemy.shootTimer <= 0) {
              enemy.shootTimer = Math.random() * 1800 + 1200;
              sound.playEnemyLaser();
              // Fire double red bullet orbs
              this.projectiles.push(new Projectile(enemy.x - 12, enemy.y + 15, 0, 4.5, true, '#ff0055'));
              this.projectiles.push(new Projectile(enemy.x + 12, enemy.y + 15, 0, 4.5, true, '#ff0055'));
            }

            // Reached bottom of screen -> instant damage & removal
            if (enemy.y > this.height + 40) {
              this.enemies.splice(idx, 1);
              
              if (this.player.shield) {
                this.player.shield = false;
                this.triggerShake(10, 0.25);
                sound.playHit();
              } else {
                this.player.hp--;
                this.triggerShake(18, 0.4);
                sound.playHit();
                if (this.player.hp <= 0) {
                  this.gameOver();
                }
              }
            }
          });

          // Update Powerups
          this.powerups.forEach((powerup, idx) => {
            powerup.update(dt);
            // Out of bounds cleanup
            if (powerup.y > this.height + 30) {
              this.powerups.splice(idx, 1);
            }
          });

          // Update Shockwave
          if (this.shockwave) {
            this.shockwave.update();
            if (this.shockwave.alpha <= 0) {
              this.shockwave = null;
            }
          }

          // Update Particles
          this.particles.forEach((part, idx) => {
            part.update();
            if (part.alpha <= 0) {
              this.particles.splice(idx, 1);
            }
          });

          // --- Collision Matrix Calculations ---

          // 1. Player Projectiles vs Enemies
          for (let p = this.projectiles.length - 1; p >= 0; p--) {
            const proj = this.projectiles[p];
            if (proj.isEnemy) continue;

            for (let e = this.enemies.length - 1; e >= 0; e--) {
              const enemy = this.enemies[e];

              // AABB Check
              const dist = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
              if (dist < (enemy.width / 2 + proj.size)) {
                // Hit!
                this.projectiles.splice(p, 1);
                
                // Damage enemy
                enemy.hp--;
                
                // Spawn minor sparks
                this.spawnExplosion(proj.x, proj.y, enemy.color, 4, 2.0);
                sound.playHit();

                if (enemy.hp <= 0) {
                  // Destroyed!
                  this.enemies.splice(e, 1);
                  sound.playExplosion(enemy.type === 'cruiser' ? 'cruiser' : 'normal');
                  
                  // Score calculations with multiplier
                  const scoreAdded = enemy.scoreValue * this.comboMultiplier;
                  this.score += scoreAdded;
                  
                  // Handle combos
                  this.comboCount++;
                  this.comboMultiplier = Math.min(5, Math.floor(this.comboCount / 5) + 1);
                  this.comboDecay = 2.0;

                  // Trigger visual death shockwave particle effect
                  this.spawnExplosion(enemy.x, enemy.y, enemy.color, enemy.type === 'cruiser' ? 25 : 12, enemy.type === 'cruiser' ? 6 : 4);
                  this.triggerShake(enemy.type === 'cruiser' ? 8 : 4, 0.15);

                  // Manage dynamic Stage Levels (difficulty scaling)
                  this.stage = Math.floor(this.score / 2000) + 1;

                  // Power-up chance
                  if (Math.random() < 0.15) {
                    this.spawnPowerup(enemy.x, enemy.y);
                  }
                }
                break; // project already destroyed, check next
              }
            }
          }

          // 2. Enemy Projectiles or Enemies vs Player
          // Check player hits
          const checkPlayerHit = (sourceX, sourceY, radius) => {
            const playerRadius = this.player.width * 0.45;
            const dist = Math.hypot(sourceX - this.player.x, sourceY - this.player.y);
            if (dist < (playerRadius + radius)) {
              if (this.player.shield) {
                // Shield saves the day
                this.player.shield = false;
                this.spawnExplosion(this.player.x, this.player.y, '#00e5ff', 30, 4);
                this.triggerShake(12, 0.3);
                sound.playExplosion('cruiser');
              } else {
                // Actual damage
                this.player.hp--;
                this.spawnExplosion(this.player.x, this.player.y, '#ff003c', 35, 5);
                this.triggerShake(24, 0.5);
                sound.playExplosion('player');
                
                if (this.player.hp <= 0) {
                  this.gameOver();
                }
              }
              return true;
            }
            return false;
          };

          // Check enemy projectiles
          for (let p = this.projectiles.length - 1; p >= 0; p--) {
            const proj = this.projectiles[p];
            if (!proj.isEnemy) continue;

            if (checkPlayerHit(proj.x, proj.y, proj.size)) {
              this.projectiles.splice(p, 1);
            }
          }

          // Check direct crashes with enemy ships
          for (let e = this.enemies.length - 1; e >= 0; e--) {
            const enemy = this.enemies[e];
            if (checkPlayerHit(enemy.x, enemy.y, enemy.width * 0.4)) {
              // Destroy enemy crashed into
              this.enemies.splice(e, 1);
              this.spawnExplosion(enemy.x, enemy.y, enemy.color, 15, 3.5);
            }
          }

          // 3. Player vs Power-ups
          for (let u = this.powerups.length - 1; u >= 0; u--) {
            const powerup = this.powerups[u];
            const playerRadius = this.player.width * 0.5;
            const dist = Math.hypot(powerup.x - this.player.x, powerup.y - this.player.y);
            
            if (dist < (playerRadius + powerup.size / 2)) {
              // Collected!
              sound.playPowerup();
              this.spawnExplosion(powerup.x, powerup.y, powerup.color, 20, 4);
              this.powerups.splice(u, 1);

              if (powerup.type === 'shield') {
                this.player.shield = true;
              } else if (powerup.type === 'double') {
                this.player.doubleShotTimer = 7.0; // 7 seconds
                this.player.spreadShotTimer = 0; // reset conflicting
              } else if (powerup.type === 'spread') {
                this.player.spreadShotTimer = 7.0; // 7 seconds
                this.player.doubleShotTimer = 0;
              } else if (powerup.type === 'bomb') {
                this.triggerBomb(powerup.x, powerup.y);
              }
            }
          }
        }
      }

      gameOver() {
        this.state = 'GAMEOVER';
        this.isPointerDown = false;
        
        // Save highscore
        if (this.score > this.highScore) {
          this.highScore = this.score;
          localStorage.setItem('neon_storm_high', this.highScore);
        }

        this.instructionsElement.style.opacity = '1';
        this.instructionsElement.innerText = "TAP GAME OVER SCREEN TO RESTART GAME";
      }

      draw(timestamp) {
        // Handle screen shake transformations
        this.ctx.save();
        if (this.screenShakeIntensity > 0 && this.screenShakeTime > 0) {
          const dx = (Math.random() - 0.5) * this.screenShakeIntensity;
          const dy = (Math.random() - 0.5) * this.screenShakeIntensity;
          this.ctx.translate(dx, dy);
        }

        // Draw deep galactic blackness
        this.ctx.fillStyle = '#010103';
        this.ctx.fillRect(0, 0, this.width, this.height);

        // Draw Stars background
        this.stars.forEach(star => star.draw(this.ctx));

        // State rendering router
        if (this.state === 'START') {
          this.drawStartScreen(timestamp);
        } else if (this.state === 'PLAYING' || this.state === 'PAUSED' || this.state === 'GAMEOVER') {
          // Draw Shockwaves
          if (this.shockwave) this.shockwave.draw(this.ctx);

          // Draw powerups
          this.powerups.forEach(pu => pu.draw(this.ctx));

          // Draw projectiles
          this.projectiles.forEach(p => p.draw(this.ctx));

          // Draw player
          if (this.state !== 'GAMEOVER' && this.player) {
            this.player.draw(this.ctx, timestamp);
          }

          // Draw enemies
          this.enemies.forEach(e => e.draw(this.ctx, timestamp));

          // Draw explosion particles
          this.particles.forEach(part => part.draw(this.ctx));

          // Draw HUD interfaces
          this.drawHUD(timestamp);

          if (this.state === 'PAUSED') {
            this.drawPauseOverlay();
          } else if (this.state === 'GAMEOVER') {
            this.drawGameOverScreen();
          }
        }

        // Restore shake transform
        this.ctx.restore();

        // Draw mute sound utility icon (always overlay on absolute canvas coordinates)
        this.drawMuteButton();
      }

      drawMuteButton() {
        this.ctx.save();
        this.ctx.strokeStyle = sound.muted ? '#ff0055' : '#00ffd0';
        this.ctx.fillStyle = sound.muted ? 'rgba(255, 0, 85, 0.1)' : 'rgba(0, 255, 208, 0.1)';
        this.ctx.lineWidth = 2;
        this.ctx.shadowBlur = 8;
        this.ctx.shadowColor = sound.muted ? '#ff0055' : '#00ffd0';

        // Outer pill
        ctxFillRoundRect(this.ctx, this.width - 50, 15, 35, 35, 8);
        this.ctx.stroke();

        // Draw speaker icon
        this.ctx.strokeStyle = sound.muted ? '#ff0055' : '#00ffd0';
        this.ctx.fillStyle = sound.muted ? '#ff0055' : '#00ffd0';
        this.ctx.lineWidth = 1.5;
        this.ctx.beginPath();
        this.ctx.moveTo(this.width - 40, 32);
        this.ctx.lineTo(this.width - 36, 32);
        this.ctx.lineTo(this.width - 32, 38);
        this.ctx.lineTo(this.width - 32, 26);
        this.ctx.lineTo(this.width - 36, 32);
        this.ctx.closePath();
        this.ctx.fill();
        this.ctx.stroke();

        this.ctx.beginPath();
        if (sound.muted) {
          // Draw X mute mark
          this.ctx.moveTo(this.width - 28, 29);
          this.ctx.lineTo(this.width - 24, 35);
          this.ctx.moveTo(this.width - 24, 29);
          this.ctx.lineTo(this.width - 28, 35);
          this.ctx.stroke();
        } else {
          // Draw sound waves
          this.ctx.arc(this.width - 32, 32, 6, -Math.PI / 3, Math.PI / 3);
          this.ctx.stroke();
        }

        this.ctx.restore();
      }

      drawStartScreen(timestamp) {
        this.ctx.save();
        
        // Deep solid void background
        this.ctx.fillStyle = '#050505';
        this.ctx.fillRect(0, 0, this.width, this.height);

        // Subtitle header
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.font = '700 13px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#00ffd0';
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("CLASSIC 2D SPACE ARCADE", this.width / 2, this.height / 2 - 130);

        // Flickering Title with red/blue offset "Geometric Balance" glitch effect
        const flicker = Math.random() > 0.04 ? 1 : 0.3;
        this.ctx.font = '900 62px "Courier New", Courier, monospace';
        
        // Red offset
        this.ctx.fillStyle = `rgba(255, 0, 0, ${flicker * 0.8})`;
        this.ctx.fillText("NEON STORM", this.width / 2 + 3, this.height / 2 - 70 + 3);
        
        // Blue offset
        this.ctx.fillStyle = `rgba(0, 0, 255, ${flicker * 0.8})`;
        this.ctx.fillText("NEON STORM", this.width / 2 - 3, this.height / 2 - 70 - 3);
        
        // Main white text
        this.ctx.fillStyle = `rgba(255, 255, 255, ${flicker})`;
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("NEON STORM", this.width / 2, this.height / 2 - 70);

        // High Score
        this.ctx.shadowBlur = 0;
        this.ctx.font = '700 16px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#ffeb3b';
        this.ctx.fillText(`HIGH SCORE: ${this.highScore.toLocaleString()}`, this.width / 2, this.height / 2);

        // Blinking Play button card
        const blink = Math.abs(Math.sin(timestamp * 0.0035));
        this.ctx.shadowBlur = 0;
        this.ctx.strokeStyle = `rgba(255, 255, 255, ${blink * 0.8 + 0.2})`;
        this.ctx.lineWidth = 2.5;
        ctxFillRoundRect(this.ctx, this.width / 2 - 150, this.height / 2 + 100, 300, 60, 0);
        this.ctx.stroke();

        this.ctx.font = '900 16px "Courier New", Courier, monospace';
        this.ctx.fillStyle = `rgba(255, 255, 255, ${blink * 0.75 + 0.25})`;
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("PRESS SPACE OR TAP TO START", this.width / 2, this.height / 2 + 130);

        // Controls summary box
        this.ctx.shadowBlur = 0;
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        this.ctx.lineWidth = 1.5;
        ctxFillRoundRect(this.ctx, this.width / 2 - 250, this.height / 2 + 250, 500, 110, 0);
        this.ctx.stroke();

        this.ctx.font = '900 12px "Courier New", Courier, monospace';
        this.ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        this.ctx.fillText("KEYBOARD CONTROLS:", this.width / 2, this.height / 2 + 275);
        this.ctx.font = '700 12px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#ffffff';
        this.ctx.fillText("MOVE: [A] / [D] or LEFT / RIGHT Arrows", this.width / 2, this.height / 2 + 295);
        this.ctx.fillText("SHOOT: [SPACEBAR]  •  PAUSE: [P] or [ESC]", this.width / 2, this.height / 2 + 315);
        this.ctx.font = '700 11px "Courier New", Courier, monospace';
        this.ctx.fillStyle = 'rgba(0, 255, 208, 0.8)';
        this.ctx.fillText("MOBILE / MOUSE: Slide screen or drag to move and auto-fire", this.width / 2, this.height / 2 + 342);

        this.ctx.restore();
      }

      drawHUD(timestamp) {
        this.ctx.save();

        // 1. Score display (Top Left)
        this.ctx.shadowBlur = 0;
        this.ctx.font = '900 28px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#ffffff';
        this.ctx.textAlign = 'left';
        this.ctx.textBaseline = 'top';
        this.ctx.fillText(this.score.toLocaleString(), 25, 20);

        // Score title label
        this.ctx.font = '700 11px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#00ffd0';
        this.ctx.fillText("SCORE", 25, 8);

        // 2. Combo and Multiplier Display (Under Score)
        if (this.comboCount >= 2) {
          const comboWidth = 140;
          const comboHeight = 16;
          const comboY = 56;
          
          this.ctx.font = '700 11px "Courier New", Courier, monospace';
          this.ctx.fillStyle = '#ff9800';
          this.ctx.shadowBlur = 0;
          this.ctx.fillText(`${this.comboMultiplier}x MULTIPLIER`, 25, comboY);

          // Decaying Combo horizontal bar
          this.ctx.shadowBlur = 0;
          this.ctx.fillStyle = 'rgba(255,255,255,0.08)';
          this.ctx.fillRect(25, comboY + 16, comboWidth, 3);
          
          this.ctx.fillStyle = '#ff9800';
          this.ctx.fillRect(25, comboY + 16, comboWidth * (this.comboDecay / 2.0), 3);
        }

        // 3. Stage & Highscore Indicators (Center-ish / Right)
        this.ctx.textAlign = 'right';
        this.ctx.shadowBlur = 0;
        this.ctx.font = '700 16px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#ffffff';
        this.ctx.fillText(`STAGE ${this.stage}`, this.width - 80, 20);

        // Highscore label
        this.ctx.shadowBlur = 0;
        this.ctx.font = '700 10px "Courier New", Courier, monospace';
        this.ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        this.ctx.fillText(`HI ${this.highScore.toLocaleString()}`, this.width - 80, 40);

        // 4. Health / Shield Status (Bottom Left)
        if (this.player) {
          const hpX = 25;
          const hpY = this.height - 35;
          const barWidth = 160;
          const barHeight = 14;

          this.ctx.textAlign = 'left';
          this.ctx.font = '700 11px "Courier New", Courier, monospace';
          this.ctx.fillStyle = '#00ffd0';
          this.ctx.shadowBlur = 0;
          this.ctx.fillText("SHIELD ENERGY", hpX, hpY - 14);

          // Background box
          this.ctx.shadowBlur = 0;
          this.ctx.fillStyle = '#111116';
          ctxFillRoundRect(this.ctx, hpX, hpY, barWidth, barHeight, 0);
          this.ctx.fill();

          // Green Segments for HP
          const segmentCount = this.player.maxHp;
          const gap = 2;
          const segmentWidth = (barWidth - (gap * (segmentCount - 1))) / segmentCount;

          for (let i = 0; i < segmentCount; i++) {
            if (i < this.player.hp) {
              this.ctx.fillStyle = '#00ff73';
              this.ctx.shadowBlur = 0;
              ctxFillRoundRect(this.ctx, hpX + i * (segmentWidth + gap), hpY, segmentWidth, barHeight, 0);
              this.ctx.fill();
            }
          }

          // Blue Over-bar overlay if Shield is active
          if (this.player.shield) {
            this.ctx.fillStyle = 'rgba(0, 229, 255, 0.2)';
            this.ctx.strokeStyle = '#00e5ff';
            this.ctx.lineWidth = 1.5;
            this.ctx.shadowBlur = 0;
            ctxFillRoundRect(this.ctx, hpX - 2, hpY - 2, barWidth + 4, barHeight + 4, 0);
            this.ctx.stroke();
          }
        }

        // 5. Active Weapon Boosters Counters (Bottom Right)
        if (this.player && (this.player.doubleShotTimer > 0 || this.player.spreadShotTimer > 0)) {
          const timerY = this.height - 35;
          const activeTime = this.player.doubleShotTimer > 0 ? this.player.doubleShotTimer : this.player.spreadShotTimer;
          const weaponLabel = this.player.doubleShotTimer > 0 ? 'DOUBLE LASER' : 'TRIPLE SPREAD';
          const weaponColor = this.player.doubleShotTimer > 0 ? '#ffeb3b' : '#e040fb';

          this.ctx.textAlign = 'right';
          this.ctx.font = '700 11px "Courier New", Courier, monospace';
          this.ctx.fillStyle = weaponColor;
          this.ctx.shadowBlur = 0;
          this.ctx.fillText(`${weaponLabel} (${activeTime.toFixed(1)}s)`, this.width - 25, timerY - 14);

          // Horizontal cooldown progress bar
          this.ctx.shadowBlur = 0;
          this.ctx.fillStyle = '#111116';
          ctxFillRoundRect(this.ctx, this.width - 155, timerY, 130, 8, 0);
          this.ctx.fill();

          this.ctx.fillStyle = weaponColor;
          ctxFillRoundRect(this.ctx, this.width - 155, timerY, 130 * (activeTime / 7.0), 8, 0);
          this.ctx.fill();
        }

        this.ctx.restore();
      }

      drawPauseOverlay() {
        this.ctx.save();
        // Solid dark backdrop dimmer
        this.ctx.fillStyle = 'rgba(5, 5, 5, 0.85)';
        this.ctx.fillRect(0, 0, this.width, this.height);

        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.font = '900 32px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#ffffff';
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("PAUSED", this.width / 2, this.height / 2 - 30);

        this.ctx.font = '700 14px "Courier New", Courier, monospace';
        this.ctx.fillStyle = 'rgba(255,255,255,0.6)';
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("Press ESC, [P], or TAP screen to resume gameplay", this.width / 2, this.height / 2 + 15);
        this.ctx.restore();
      }

      drawGameOverScreen() {
        this.ctx.save();
        this.ctx.fillStyle = 'rgba(5, 5, 5, 0.9)';
        this.ctx.fillRect(0, 0, this.width, this.height);

        // Header Game Over with red/blue offset
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.font = '900 48px "Courier New", Courier, monospace';
        
        // Glitch shadow offsets
        this.ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
        this.ctx.fillText("SYSTEM CRITICAL", this.width / 2 + 2, this.height / 2 - 140 + 2);
        this.ctx.fillStyle = 'rgba(0, 0, 255, 0.8)';
        this.ctx.fillText("SYSTEM CRITICAL", this.width / 2 - 2, this.height / 2 - 140 - 2);
        
        this.ctx.fillStyle = '#ff003c';
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("SYSTEM CRITICAL", this.width / 2, this.height / 2 - 140);

        this.ctx.font = '900 24px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#ffffff';
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("GAME OVER", this.width / 2, this.height / 2 - 80);

        // Scores Box
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        this.ctx.lineWidth = 1.5;
        ctxFillRoundRect(this.ctx, this.width / 2 - 150, this.height / 2 - 30, 300, 150, 0);
        this.ctx.stroke();

        this.ctx.font = '700 13px "Courier New", Courier, monospace';
        this.ctx.fillStyle = 'rgba(255,255,255,0.4)';
        this.ctx.fillText("FINAL SCORE", this.width / 2, this.height / 2 - 5);
        this.ctx.font = '900 36px "Courier New", Courier, monospace';
        this.ctx.fillStyle = '#ffffff';
        this.ctx.shadowBlur = 0;
        this.ctx.fillText(this.score.toLocaleString(), this.width / 2, this.height / 2 + 25);

        // Is high score?
        if (this.score >= this.highScore && this.score > 0) {
          this.ctx.font = '900 11px "Courier New", Courier, monospace';
          this.ctx.fillStyle = '#ffeb3b';
          this.ctx.shadowBlur = 0;
          this.ctx.fillText("★ NEW RECORD ★", this.width / 2, this.height / 2 + 65);
        } else {
          this.ctx.font = '700 13px "Courier New", Courier, monospace';
          this.ctx.fillStyle = 'rgba(255, 235, 59, 0.8)';
          this.ctx.fillText(`BEST RECORD: ${this.highScore.toLocaleString()}`, this.width / 2, this.height / 2 + 65);
        }

        // Restart Instructions blinking
        const blink = Math.abs(Math.sin(Date.now() * 0.0035));
        this.ctx.shadowBlur = 0;
        this.ctx.strokeStyle = `rgba(255, 255, 255, ${blink * 0.8 + 0.2})`;
        this.ctx.lineWidth = 2.5;
        ctxFillRoundRect(this.ctx, this.width / 2 - 140, this.height / 2 + 160, 280, 50, 0);
        this.ctx.stroke();

        this.ctx.font = '900 15px "Courier New", Courier, monospace';
        this.ctx.fillStyle = `rgba(255, 255, 255, ${blink * 0.8 + 0.2})`;
        this.ctx.shadowBlur = 0;
        this.ctx.fillText("PRESS 'R' KEY OR TAP HERE", this.width / 2, this.height / 2 + 185);

        this.ctx.restore();
      }
    }

    // --- Helper function to draw sharp rectangles (geometric style) on HTML Canvas ---
    function ctxFillRoundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.rect(x, y, width, height);
      ctx.closePath();
    }

    // --- Launch and Main Animation Engine Loops ---
    const game = new Game();

    function loop(timestamp) {
      if (!game.lastTime) game.lastTime = timestamp;
      let dt = (timestamp - game.lastTime) / 1000;
      
      // Safety throttle (caps dt spikes e.g. from background tab switches)
      if (dt > 0.1) dt = 0.1;
      
      game.lastTime = timestamp;

      game.update(dt, timestamp);
      game.draw(timestamp);

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
